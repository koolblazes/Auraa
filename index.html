<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AURAA MVP — Service Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://checkout.flutterwave.com/v3.js"></script>

    <style>
        :root {
            --green: #0a5c36;
            --green-light: #0e7a49;
            --gold: #c9a84c;
            --bg: #fdfdfb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg); color: #1a1a1a; padding: 20px; }
        
        .app-container { max-width: 480px; margin: 0 auto; background: white; border-radius: 28px; padding: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.04); min-height: 90vh; display: flex; flex-direction: column; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .logo { font-family: 'Syne', sans-serif; font-weight: 800; color: var(--green); font-size: 24px; }
        .wallet-pill { background: #f4f7f5; padding: 8px 16px; border-radius: 100px; display: flex; align-items: center; gap: 8px; }
        .balance { font-weight: 600; color: var(--green); }

        .booking-card { flex-grow: 1; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 8px; font-weight: 600; }
        input { width: 100%; padding: 16px; border: 1.5px solid #f0f0f0; border-radius: 14px; font-family: inherit; font-size: 16px; outline: none; }
        input:focus { border-color: var(--green); }

        .btn-main { width: 100%; padding: 18px; background: var(--green); color: white; border: none; border-radius: 16px; font-weight: 600; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-main:hover { background: var(--green-light); transform: translateY(-1px); }

        /* Infrastructure Partners Section */
        .partners-footer { margin-top: auto; padding-top: 30px; border-top: 1px solid #f0f0f0; text-align: center; }
        .partner-label { font-size: 11px; color: #bbb; letter-spacing: 1.5px; margin-bottom: 15px; }
        .partner-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .partner-chip { background: #fafafa; border: 1px dashed #ddd; padding: 10px; border-radius: 8px; font-size: 12px; color: #666; }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: white; padding: 14px 28px; border-radius: 12px; font-size: 14px; display: none; z-index: 9999; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div id="toast"></div>

<div class="app-container">
    <div class="header">
        <div class="logo">AURAA</div>
        <div class="wallet-pill">
            <span style="font-size: 12px; color: #666;">Wallet</span>
            <span class="balance" id="display-balance">₦0.00</span>
        </div>
    </div>

    <div class="booking-card">
        <div class="input-group">
            <label>Activation Point (Pickup)</label>
            <input type="text" id="pickup" placeholder="Current location..."/>
        </div>
        <div class="input-group">
            <label>Destination Node</label>
            <input type="text" id="dropoff" placeholder="Where is the asset moving?"/>
        </div>
        <button class="btn-main" onclick="handleNetworkRequest()">Request Vehicle Activation</button>
    </div>

    <div class="partners-footer">
        <div class="partner-label">NETWORK PARTNERS</div>
        <div class="partner-row">
            <div class="partner-chip">Insurance Partner</div>
            <div class="partner-chip">Telco Partner</div>
        </div>
    </div>
</div>

<script>
// 1. SUPABASE CONFIG
const supabaseUrl = 'https://yroffdxgkppmqngybboj.supabase.co';
const supabaseKey = 'sb_publishable_OcRlo6xhsrvzSWCG5dGkoA_AYqt-fdh';
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

// 2. REAL-TIME NETWORK SYNC
async function initAuraaSync() {
    _supabase
        .channel('public:trips')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'trips' }, payload => {
            showToast("📡 Network Sync: Activation sequence live.");
        })
        .subscribe();
}

// 3. CORE LOGIC
async function handleNetworkRequest() {
    const pickup = document.getElementById('pickup').value;
    const dropoff = document.getElementById('dropoff').value;

    if(!pickup || !dropoff) {
        showToast("Please specify network nodes.");
        return;
    }

    showToast("Broadcasting to AURAA cloud...");

    // This writes to your Supabase "Filing Cabinet"
    const { error } = await _supabase
        .from('trips')
        .insert([{ 
            origin: pickup, 
            destination: dropoff, 
            status: 'pending',
            price: 5000 
        }]);

    if (error) {
        console.error(error);
        showToast("Sync Error. Ensure Supabase table exists.");
    } else {
        showToast("Success: Broadcast active on all devices.");
    }
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 4000);
}

window.onload = initAuraaSync;
</script>

</body>
</html>
