<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AURAA Technologies — MVP v10.4</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --green: #0a5c36;
  --green-light: #12803f;
  --gold: #c9a84c;
  --gold-light: #e8c96a;
  --dark: #0d0d0d;
  --dark2: #141414;
  --dark3: #1c1c1c;
  --card: #1a1a1a;
  --border: rgba(201,168,76,0.18);
  --text: #f0f0f0;
  --muted: #888;
  --white: #ffffff;
  --danger: #e05252;
  --success: #3ecf78;
  --info: #4ea8de;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;overflow-x:hidden;}
body.light-mode{--dark:#f4f4f4;--dark2:#e8e8e8;--dark3:#dddddd;--card:#ffffff;--border:rgba(10,92,54,0.15);--text:#1a1a1a;--muted:#666;}

@keyframes search{from{width:30%;}to{width:90%;}}

/* LOGO MARK */
.auraa-logo-mark{display:inline-flex;align-items:center;justify-content:center;}
.auraa-logo-mark svg{display:block;}
.auraa-wordmark{font-family:'Syne',sans-serif;font-weight:800;letter-spacing:0.15em;color:var(--gold);}
.auraa-reg{font-family:'DM Sans',sans-serif;font-size:.65rem;font-weight:400;color:rgba(255,255,255,.45);letter-spacing:.2em;text-transform:uppercase;margin-top:.15rem;}

/* SPLASH */
#splash{position:fixed;inset:0;background:linear-gradient(135deg,#050f08 0%,#0a1f12 50%,#050f08 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .6s;}
#splash.hidden{opacity:0;pointer-events:none;}
.splash-logo{font-family:'Syne',sans-serif;font-size:3.5rem;font-weight:800;color:var(--gold);letter-spacing:0.15em;animation:pulse 2s infinite;}
.splash-sub{color:rgba(255,255,255,0.5);font-size:.85rem;letter-spacing:.25em;text-transform:uppercase;margin-top:.5rem;}
.splash-tagline{color:rgba(255,255,255,0.3);font-size:.75rem;margin-top:2rem;text-align:center;max-width:260px;line-height:1.6;}
.splash-tap{color:var(--gold);font-size:.75rem;margin-top:3rem;animation:blink 1.5s infinite;letter-spacing:.1em;}
@keyframes pulse{0%,100%{text-shadow:0 0 20px rgba(201,168,76,.4);}50%{text-shadow:0 0 40px rgba(201,168,76,.8);}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

/* ROLE SELECT */
#roleSelect{position:fixed;inset:0;background:var(--dark);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9998;padding:2rem;}
#roleSelect.show{display:flex;}
.role-title{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;color:var(--gold);margin-bottom:.5rem;text-align:center;}
.role-sub{color:var(--muted);font-size:.85rem;margin-bottom:2.5rem;text-align:center;}
.role-cards{display:grid;grid-template-columns:1fr 1fr;gap:1rem;width:100%;max-width:380px;}
.role-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem 1rem;text-align:center;cursor:pointer;transition:all .25s;}
.role-card:hover,.role-card:active{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,168,76,.15);}
.role-icon{font-size:2rem;margin-bottom:.75rem;}
.role-name{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;color:var(--text);}
.role-desc{font-size:.72rem;color:var(--muted);margin-top:.3rem;}

/* ADMIN CODE GATE */
#adminGate{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:10000;display:none;align-items:center;justify-content:center;padding:2rem;}
#adminGate.show{display:flex;}
.admin-gate-box{background:var(--dark2);border:1px solid var(--border);border-radius:20px;padding:2rem 1.5rem;width:100%;max-width:340px;text-align:center;}
.admin-gate-icon{font-size:2.5rem;margin-bottom:.75rem;}
.admin-gate-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:var(--gold);margin-bottom:.4rem;}
.admin-gate-sub{font-size:.78rem;color:var(--muted);margin-bottom:1.25rem;}
.role-card.investor-card{border-color:var(--gold);background:linear-gradient(135deg,rgba(201,168,76,.08),rgba(201,168,76,.03));}
.role-card.locked{opacity:.7;position:relative;}
.lock-icon{position:absolute;top:.5rem;right:.5rem;font-size:.75rem;}

/* HEADER */
#appHeader{background:var(--dark2);border-bottom:1px solid var(--border);padding:.75rem 1rem;display:none;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
#appHeader.show{display:flex;}
.header-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;color:var(--gold);cursor:pointer;user-select:none;}
.header-role{font-size:.72rem;color:var(--muted);display:flex;align-items:center;gap:.4rem;}
.live-badge{background:var(--gold);color:var(--dark);font-size:.6rem;font-weight:700;padding:.15rem .4rem;border-radius:20px;letter-spacing:.05em;}
.header-actions{display:flex;gap:.5rem;align-items:center;}
.icon-btn{background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:.3rem;border-radius:8px;transition:color .2s;}
.icon-btn:hover{color:var(--gold);}

/* ADMIN TICKER */
#adminTicker{background:var(--green);color:var(--white);font-size:.72rem;padding:.4rem 1rem;overflow:hidden;white-space:nowrap;display:none;}
#adminTicker.show{display:block;}
.ticker-inner{display:inline-block;animation:ticker 30s linear infinite;}
@keyframes ticker{from{transform:translateX(100vw);}to{transform:translateX(-100%);}}

/* TABS */
#tabBar{display:none;background:var(--dark2);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;position:sticky;top:57px;z-index:99;}
#tabBar.show{display:flex;}
#tabBar::-webkit-scrollbar{display:none;}
.tab{padding:.65rem 1rem;font-size:.75rem;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;font-family:'Syne',sans-serif;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}

/* MAIN CONTENT */
#mainContent{display:none;padding:1rem;max-width:500px;margin:0 auto;padding-bottom:80px;}
#mainContent.show{display:block;}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.25rem;margin-bottom:1rem;}
.card-title{font-family:'Syne',sans-serif;font-size:.85rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:1rem;}

/* SERVICE PILLS */
.service-pills{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem;}
.pill{padding:.45rem .9rem;border-radius:20px;font-size:.75rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border);color:var(--muted);transition:all .2s;font-family:'Syne',sans-serif;}
.pill.active{background:var(--green);color:var(--white);border-color:var(--green);}
.pill:hover{border-color:var(--gold);color:var(--gold);}

/* BOOKING FORM */
.form-group{margin-bottom:.85rem;}
.form-label{font-size:.72rem;color:var(--muted);margin-bottom:.35rem;display:block;font-weight:600;letter-spacing:.05em;}
.form-input{width:100%;background:var(--dark3);border:1px solid var(--border);border-radius:10px;padding:.65rem .85rem;color:var(--text);font-size:.85rem;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;}
.form-input:focus{border-color:var(--gold);}
.form-input::placeholder{color:var(--muted);}

/* BUTTONS */
.btn{width:100%;padding:.8rem;border:none;border-radius:12px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;transition:all .25s;letter-spacing:.03em;}
.btn-primary{background:linear-gradient(135deg,var(--green),var(--green-light));color:var(--white);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(10,92,54,.4);}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--dark);}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(201,168,76,.4);}
.btn-outline{background:none;border:1.5px solid var(--border);color:var(--text);}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}
.btn-sm{padding:.5rem .9rem;font-size:.75rem;width:auto;}
.btn-danger{background:var(--danger);color:var(--white);}

/* FARE DISPLAY */
.fare-box{background:var(--dark3);border:1px solid var(--border);border-radius:12px;padding:1rem;text-align:center;margin:1rem 0;}
.fare-amount{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--gold);}
.fare-label{font-size:.72rem;color:var(--muted);margin-top:.2rem;}
.split-row{display:flex;justify-content:space-between;align-items:center;padding:.35rem 0;border-bottom:1px solid var(--border);font-size:.78rem;}
.split-row:last-child{border-bottom:none;}
.split-label{color:var(--muted);}
.split-val{font-weight:600;color:var(--text);}

/* WALLET */
.wallet-balance{text-align:center;padding:1.5rem 0;}
.wallet-amount{font-family:'Syne',sans-serif;font-size:2.5rem;font-weight:800;color:var(--gold);}
.wallet-label{font-size:.75rem;color:var(--muted);margin-top:.3rem;letter-spacing:.1em;text-transform:uppercase;}
.wallet-actions{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-top:1.25rem;}
.tx-row{display:flex;justify-content:space-between;align-items:center;padding:.75rem 0;border-bottom:1px solid var(--border);}
.tx-row:last-child{border-bottom:none;}
.tx-info{display:flex;flex-direction:column;gap:.2rem;}
.tx-title{font-size:.82rem;font-weight:600;}
.tx-date{font-size:.7rem;color:var(--muted);}
.tx-amount{font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;}
.tx-credit{color:var(--success);}
.tx-debit{color:var(--danger);}

/* EARNINGS CHART */
.chart-bar-wrap{display:flex;align-items:flex-end;gap:6px;height:80px;margin-top:.75rem;}
.chart-bar-col{display:flex;flex-direction:column;align-items:center;flex:1;gap:4px;}
.chart-bar{width:100%;background:var(--green);border-radius:4px 4px 0 0;transition:height .5s ease;min-height:4px;}
.chart-bar.highlight{background:var(--gold);}
.chart-label{font-size:.6rem;color:var(--muted);}

/* TRIP STATUS */
.status-card{border-radius:16px;padding:1.25rem;text-align:center;margin-bottom:1rem;}
.status-icon{font-size:2.5rem;margin-bottom:.75rem;}
.status-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:.4rem;}
.status-sub{font-size:.8rem;color:var(--muted);}
.progress-bar-wrap{background:var(--dark3);border-radius:20px;height:6px;margin:1rem 0;overflow:hidden;}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--green),var(--gold));border-radius:20px;transition:width 1s ease;}
.eta-row{display:flex;justify-content:space-around;margin-top:.75rem;}
.eta-item{text-align:center;}
.eta-val{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;color:var(--gold);}
.eta-lbl{font-size:.65rem;color:var(--muted);}

/* MAP PLACEHOLDER */
.map-box{background:var(--dark3);border-radius:12px;height:160px;position:relative;overflow:hidden;border:1px solid var(--border);}
.map-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(201,168,76,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,.05) 1px,transparent 1px);background-size:20px 20px;}
.map-dot{position:absolute;width:14px;height:14px;background:var(--gold);border-radius:50%;box-shadow:0 0 10px var(--gold);animation:moveDot 6s infinite linear;}
.map-dest{position:absolute;width:10px;height:10px;background:var(--success);border-radius:50%;top:30%;right:20%;}
.map-label{position:absolute;bottom:.5rem;left:.75rem;font-size:.65rem;color:var(--muted);}
@keyframes moveDot{0%{top:70%;left:20%;}25%{top:50%;left:40%;}50%{top:35%;left:55%;}75%{top:30%;left:65%;}100%{top:70%;left:20%;}}

/* OWNER MONITOR */
.monitor-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:1rem;}
.monitor-header{background:var(--green);padding:.75rem 1rem;display:flex;justify-content:space-between;align-items:center;}
.monitor-title{font-family:'Syne',sans-serif;font-size:.85rem;font-weight:700;color:var(--white);}
.monitor-status{font-size:.7rem;color:rgba(255,255,255,.7);display:flex;align-items:center;gap:.3rem;}
.pulse-dot{width:8px;height:8px;background:var(--gold);border-radius:50%;animation:pulseDot 1.5s infinite;}
@keyframes pulseDot{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.4);opacity:.6;}}
.monitor-body{padding:1rem;}
.timeline{position:relative;padding-left:1.25rem;}
.timeline::before{content:'';position:absolute;left:.35rem;top:0;bottom:0;width:2px;background:var(--border);}
.tl-item{position:relative;padding-bottom:.85rem;font-size:.78rem;}
.tl-item::before{content:'';position:absolute;left:-.95rem;top:.2rem;width:8px;height:8px;border-radius:50%;background:var(--muted);}
.tl-item.done::before{background:var(--success);}
.tl-item.active::before{background:var(--gold);animation:pulseDot 1.5s infinite;}
.tl-time{color:var(--muted);font-size:.68rem;}
.alert-row{display:flex;align-items:center;gap:.5rem;padding:.5rem .75rem;border-radius:8px;margin-top:.5rem;font-size:.75rem;}
.alert-warn{background:rgba(224,82,82,.1);border:1px solid rgba(224,82,82,.2);color:var(--danger);}
.alert-ok{background:rgba(62,207,120,.1);border:1px solid rgba(62,207,120,.2);color:var(--success);}

/* DRIVER PANEL */
.trip-request{background:var(--dark3);border:1.5px solid var(--gold);border-radius:14px;padding:1rem;margin-bottom:.75rem;animation:slideIn .3s ease;}
@keyframes slideIn{from{transform:translateY(-10px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.trip-req-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;}
.trip-service-tag{background:var(--green);color:var(--white);font-size:.65rem;font-weight:700;padding:.2rem .6rem;border-radius:20px;font-family:'Syne',sans-serif;}
.trip-fare-tag{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;color:var(--gold);}
.trip-route{font-size:.78rem;margin-bottom:.75rem;}
.trip-from,.trip-to{color:var(--muted);margin-bottom:.25rem;}
.trip-from span,.trip-to span{color:var(--text);font-weight:500;}
.trip-actions{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;}
.countdown{font-family:'Syne',sans-serif;font-size:.7rem;color:var(--gold);text-align:right;}

/* INVESTOR DECK */
#investorOverlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:10001;display:none;align-items:center;justify-content:center;padding:1rem;}
#investorOverlay.show{display:flex;}
.deck-modal{background:var(--dark2);border:1px solid var(--border);border-radius:20px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;position:relative;}
.deck-close{position:absolute;top:.75rem;right:.75rem;background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer;z-index:10;}
.deck-slide{padding:1.5rem;min-height:300px;display:none;}
.deck-slide.active{display:block;}
.slide-num{font-size:.65rem;color:var(--muted);margin-bottom:.5rem;letter-spacing:.1em;}
.slide-title{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:var(--gold);margin-bottom:.75rem;line-height:1.3;}
.slide-body{font-size:.82rem;color:var(--muted);line-height:1.7;}
.slide-body strong{color:var(--text);}
.slide-metric{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--gold);text-align:center;padding:1rem 0;}
.slide-metric-label{font-size:.72rem;color:var(--muted);text-align:center;margin-top:-.5rem;}
.deck-nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;border-top:1px solid var(--border);}
.deck-nav-btn{background:none;border:1.5px solid var(--border);color:var(--text);padding:.5rem 1rem;border-radius:8px;font-size:.78rem;cursor:pointer;font-family:'Syne',sans-serif;transition:all .2s;}
.deck-nav-btn:hover{border-color:var(--gold);color:var(--gold);}
.deck-progress{font-size:.72rem;color:var(--muted);}
.deck-cta{display:grid;gap:.75rem;padding:1rem 1.5rem;border-top:1px solid var(--border);}

/* NDA GATE */
.nda-gate{text-align:center;padding:2rem 1rem;}
.nda-icon{font-size:3rem;margin-bottom:1rem;}
.nda-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:var(--gold);margin-bottom:.5rem;}
.nda-text{font-size:.78rem;color:var(--muted);margin-bottom:1.5rem;line-height:1.6;}

/* STATS GRID */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem;}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1rem;text-align:center;}
.stat-val{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:var(--gold);}
.stat-lbl{font-size:.68rem;color:var(--muted);margin-top:.2rem;}

/* VISITOR TRACKER */
.visitor-box{background:var(--dark3);border-radius:10px;padding:.85rem;font-size:.75rem;}
.visitor-row{display:flex;justify-content:space-between;padding:.3rem 0;border-bottom:1px solid var(--border);}
.visitor-row:last-child{border-bottom:none;}

/* THEME TOGGLE */
.theme-toggle{position:fixed;bottom:1.5rem;right:1rem;background:var(--card);border:1px solid var(--border);border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.3);z-index:200;transition:transform .2s;}
.theme-toggle:hover{transform:scale(1.1);}

/* TOAST */
.toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.65rem 1.25rem;font-size:.78rem;color:var(--text);opacity:0;pointer-events:none;transition:all .3s;z-index:9999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* REVENUE STREAMS */
.rev-row{display:flex;align-items:center;gap:.75rem;padding:.6rem 0;border-bottom:1px solid var(--border);}
.rev-row:last-child{border-bottom:none;}
.rev-icon{font-size:1.2rem;width:32px;text-align:center;}
.rev-info{flex:1;}
.rev-name{font-size:.82rem;font-weight:600;}
.rev-desc{font-size:.68rem;color:var(--muted);}
.rev-pct{font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;color:var(--gold);}

/* MISC */
.divider{height:1px;background:var(--border);margin:1rem 0;}
.badge{display:inline-block;padding:.2rem .55rem;border-radius:20px;font-size:.65rem;font-weight:700;font-family:'Syne',sans-serif;}
.badge-green{background:rgba(10,92,54,.25);color:var(--success);border:1px solid rgba(62,207,120,.2);}
.badge-gold{background:rgba(201,168,76,.15);color:var(--gold);border:1px solid rgba(201,168,76,.25);}
.badge-red{background:rgba(224,82,82,.15);color:var(--danger);border:1px solid rgba(224,82,82,.25);}
.section-header{font-family:'Syne',sans-serif;font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.75rem;}
.empty-state{text-align:center;padding:2.5rem 1rem;color:var(--muted);font-size:.82rem;}
.empty-icon{font-size:2.5rem;margin-bottom:.75rem;opacity:.4;}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash" onclick="hideSplash()">
