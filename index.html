<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AURAA — MVP Service Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600&family=Syne:wght@800&display=swap" rel="stylesheet"/>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://checkout.flutterwave.com/v3.js"></script>

<style>
:root {
  --green:#0a5c36;
  --green-deep:#072b1a;
  --gold:#c9a84c;
  --gold-pale:rgba(201,168,76,0.12);
  --cream:#f5f0e8;
  --ink:#0a0e0c;
  --border:rgba(201,168,76,0.2);
}

*{box-sizing:border-box;margin:0;padding:0}
body{
    background:var(--ink);
    color:var(--cream);
    font-family:'Outfit',sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:20px;
}

/* NOISE TEXTURE */
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:1000;opacity:0.4;
}

.app-container {
    width: 100%;
    max-width: 480px;
    background: var(--green-deep);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 40px;
    position: relative;
    z-index: 2;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
}

.logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--gold);
}

.wallet-display {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--gold);
    border: 1px solid var(--border);
    padding: 8px 12px;
}

/* ONBOARDING TABS */
.tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 30px;
    overflow-x: auto;
    padding-bottom: 5px;
}

.tab {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 16px;
    border: 1px solid var(--border);
    color: var(--gold);
    cursor: pointer;
    white-space: nowrap;
    transition: 0.3s;
}

.tab.active {
    background: var(--gold);
    color: var(--ink);
}

.form-section { display: none; animation: fadeUp 0.5s ease forwards; }
.form-section.active { display: block; }

.input-group { margin-bottom: 24px; }
label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
}

input, select {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    padding: 16px;
    color: var(--cream);
    font-family: 'Outfit', sans-serif;
    outline: none;
}

input:focus { border-color: var(--gold); }

.btn-primary {
    width: 100%;
    background: var(--gold);
    color: var(--ink);
    padding: 18px;
    border: none;
    font-family: 'Outfit', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 600;
    cursor: pointer;
    transition: 0.25s;
}

.btn-primary:hover { background: var(--cream); transform: translateY(-2px); }

#toast {
    position: fixed;
    bottom: 30px;
    background: var(--gold);
    color: var(--ink);
    padding: 16px 30px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 1px;
    display: none;
    z-index: 2000;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div id="toast"></div>

<div class="app-container">
    <div class="header">
        <div class="logo">AURAA</div>
        <div class="wallet-display" id="balance">₦0.00</div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('rider', this)">Rider</div>
        <div class="tab" onclick="switchTab('driver', this)">Driver</div>
        <div class="tab" onclick="switchTab('owner', this)">Owner</div>
        <div class="tab" onclick="switchTab('mechanic', this)">Mechanic</div>
    </div>

    <div id="rider" class="form-section active">
        <div class="input-group">
            <label>Pickup Node</label>
            <input type="text" id="r-origin" placeholder="Current location..."/>
        </div>
        <div class="input-group">
            <label>Destination Node</label>
            <input type="text" id="r-dest" placeholder="Where to?"/>
        </div>
        <button class="btn-primary" onclick="processSync('Rider')">Request Activation</button>
    </div>

    <div id="driver" class="form-section">
        <div class="input-group">
            <label>Full Legal Name</label>
            <input type="text" placeholder="As on ID..."/>
        </div>
        <div class="input-group">
            <label>License Class</label>
            <select>
                <option>Class B</option>
                <option>Class C</option>
            </select>
        </div>
        <button class="btn-primary" onclick="processSync('Driver')">Submit Verification</button>
    </div>

    <div id="owner" class="form-section">
        <div class="input-group">
            <label>Vehicle Make/Model</label>
            <input type="text" placeholder="e.g. 2018 Toyota Camry"/>
        </div>
        <button class="btn-primary" onclick="processSync('Owner')">Register Asset</button>
    </div>

    <div id="mechanic" class="form-section">
        <div class="input-group">
            <label>Workshop Area</label>
            <input type="text" placeholder="Lagos Mainland/Island..."/>
        </div>
        <button class="btn-primary" onclick="processSync('Mechanic')">Join Fleet Support</button>
    </div>
</div>

<script>
// SUPABASE CONFIG (Your actual keys)
const supabaseUrl = 'https://yroffdxgkppmqngybboj.supabase.co';
const supabaseKey = 'sb_publishable_OcRlo6xhsrvzSWCG5dGkoA_AYqt-fdh';
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

function switchTab(id, el) {
    document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    el.classList.add('active');
}

async function processSync(role) {
    showToast(`BROADCASTING ${role.toUpperCase()} SIGNAL...`);
    
    // Send to Supabase
    const { error } = await _supabase
        .from('trips')
        .insert([{ 
            origin: "MVP_PORTAL", 
            destination: role, 
            status: 'onboarding_active' 
        }]);

    if (!error) {
        showToast(`${role} DATA SYNCED TO NETWORK`);
    } else {
        showToast("NETWORK ERROR: CHECK SUPABASE");
    }
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3500);
}

// Listen for cross-device signals
_supabase.channel('public:trips').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'trips' }, payload => {
    showToast("📡 REMOTE SIGNAL: Incoming Request");
}).subscribe();

</script>
</body>
</html>
