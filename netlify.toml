# ════════════════════════════════════════════════════════════════════
# Netlify config for AURAA — adds serverless functions support
# Path: netlify.toml (project root)
#
# Notes:
#   • Functions live in netlify/functions/  (Netlify's default location)
#   • Node 18+ has built-in fetch — no external deps for verify-payment.js
#   • Static site is unchanged — index.html still serves from root
# ════════════════════════════════════════════════════════════════════

[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Force Node 18 (default is 20 which also works; 18 is most stable)
[build.environment]
  NODE_VERSION = "18"
