# ═══════════════════════════════════════════════════════════════
# AURAA — Netlify Configuration
# ═══════════════════════════════════════════════════════════════
#
# Declares the functions directory and Node.js runtime version.
# Without this file, /.netlify/functions/verify-payment will 404.
#
# IMPORTANT: After deploying, set the Flutterwave secret key in
# Netlify dashboard → Site configuration → Environment variables:
#   FLW_SECRET_KEY = <your live secret key, starts FLWSECK->
# ═══════════════════════════════════════════════════════════════

[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
